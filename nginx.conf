# Nginx reverse proxy for OpenClawFactory
# Place in /etc/nginx/sites-available/openclaw and symlink to sites-enabled
# Replace YOUR_DOMAIN_OR_IP with your droplet IP or domain

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Dashboard (Next.js on port 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (FastAPI on port 8000)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # WebSocket (FastAPI on port 8000)
    location /ws {
        proxy_pass         http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
    }
}
